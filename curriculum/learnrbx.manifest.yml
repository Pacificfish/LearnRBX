            starterCode: "local object = {Position = Vector3.new(0, 0, 0), Transparency = 0}\nlocal function animateObject()\n  -- Simulate tween\n  for i = 1, 10 do\n    object.Position = Vector3.new(i, 0, 0)\n    object.Transparency = i * 0.1\n  end\n  print(\"Animation complete. Final position: \" .. tostring(object.Position))\nend\nanimateObject()"
            tests:
