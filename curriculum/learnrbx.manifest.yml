  - slug: capstones
    title: Capstones & Advanced Topics (Premium)
    description: Multi-lesson mini-projects combining systems.
    is_premium: true
    modules:
      - title: Capstones
        lessons:
          - slug: coin-collector-capstone
            title: "Capstone: Coin Collector"
            duration_min: 25
            summary: Combine pickups + UI score.
            objectives: ["Combine systems", "Export starter"]
            starterCode: "local score = 0\nlocal coins = {\"coin1\", \"coin2\", \"coin3\", \"coin4\", \"coin5\"}\nfor _, coin in ipairs(coins) do\n  score = score + 1\n  print(\"Collected \" .. coin .. \". Score: \" .. score)\nend\nprint(\"Final Score: \" .. score)"
            tests:
              - type: runtime
                assert: output_contains
                value: "Final Score:"
                description: "Prints final score"
            hints: ["Print final score."]
            successMessage: "Capstone cleared—export starter."
          
          - slug: inventory-shop-capstone
            title: "Capstone: Inventory & Shop"
            duration_min: 30
            summary: Complete inventory and shop system.
            objectives: ["Build shop", "Manage inventory", "Handle transactions"]
            starterCode: "local inventory = {}\nlocal shop = {[\"Sword\"] = 50, [\"Potion\"] = 25}\nlocal coins = 100\nlocal function buyItem(itemName)\n  if shop[itemName] and coins >= shop[itemName] then\n    coins = coins - shop[itemName]\n    table.insert(inventory, itemName)\n    print(\"Bought \" .. itemName .. \". Coins left: \" .. coins)\n    return true\n  else\n    print(\"Cannot buy \" .. itemName)\n    return false\n  end\nend\nbuyItem(\"Sword\")\nprint(\"Inventory: \" .. table.concat(inventory, \", \"))"
            tests:
              - type: static
                assert: function_exists
                value: buyItem
                description: "Defines buy function"
            hints: ["Check shop prices and player coins."]
            successMessage: "Shop system complete!"
          
          - slug: npc-quest-capstone
            title: "Capstone: NPC & Quest System"
            duration_min: 35
            summary: Interactive NPCs with quest system.
            objectives: ["Create NPCs", "Design quests", "Track progress"]
            starterCode: "local npc = {name = \"QuestGiver\", quests = {}}\nlocal player = {name = \"Player1\", activeQuests = {}}\nlocal function giveQuest(questName, description, reward)\n  local quest = {name = questName, description = description, reward = reward, completed = false}\n  table.insert(npc.quests, quest)\n  table.insert(player.activeQuests, quest)\n  print(\"Quest given: \" .. questName .. \" - \" .. description)\nend\ngiveQuest(\"Collect Coins\", \"Find 10 coins\", 100)\nprint(\"Player has \" .. #player.activeQuests .. \" active quests\")"
            tests:
              - type: static
                assert: function_exists
                value: giveQuest
                description: "Defines quest giving function"
            hints: ["Store quests in tables and track completion."]
            successMessage: "NPC quest system operational!"
          
          - slug: complete-game-capstone
            title: "Capstone: Complete Mini-Game"
            duration_min: 40
            summary: Full game with all systems combined.
            objectives: ["Combine all systems", "Create complete game", "Polish and test"]
            starterCode: "-- Complete mini-game combining all systems\nlocal game = {\n  player = {name = \"Player1\", health = 100, coins = 0, level = 1},\n  enemies = {{name = \"Goblin\", health = 50}, {name = \"Orc\", health = 80}},\n  items = {[\"Health Potion\"] = 25, [\"Sword\"] = 50}\n}\nlocal function gameLoop()\n  print(\"=== GAME START ===\")\n  print(\"Player: \" .. game.player.name)\n  print(\"Health: \" .. game.player.health)\n  print(\"Coins: \" .. game.player.coins)\n  print(\"Level: \" .. game.player.level)\n  print(\"Enemies defeated: \" .. #game.enemies)\n  print(\"Items available: \" .. table.concat(vim.tbl_keys(game.items), \", \"))\n  print(\"=== GAME COMPLETE ===\")\nend\ngameLoop()"
            tests:
              - type: static
                assert: function_exists
                value: gameLoop
                description: "Defines main game loop"
            hints: ["Combine all learned systems into one game."]
            successMessage: "Complete game system finished!"
        
        module_test:
          title: "Final Checkpoint (Optional)"
          questions:
            - type: mc
              prompt: "Best way to prevent double-trigger?"
              choices: ["wait(1)", "debounce flag", "repeat loop", "delay()"]
              answerIndex: 1
              explanation: "Debounce flags prevent rapid-fire events."
            - type: mc
              prompt: "What combines multiple game systems?"
              choices: ["modules", "capstones", "templates", "scripts"]
              answerIndex: 1
              explanation: "Capstones combine multiple systems into complete projects."
